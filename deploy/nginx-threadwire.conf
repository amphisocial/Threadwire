# /etc/nginx/sites-available/threadwire
# Replaces the current threadwire.ai root with the app. Static React build is
# served from /var/www/threadwire/dist; /api is proxied to the FastAPI backend.

server {
    listen 80;
    listen [::]:80;
    server_name threadwire.ai www.threadwire.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name threadwire.ai www.threadwire.ai;

    # Reuse your existing Let's Encrypt certificate for threadwire.ai
    ssl_certificate     /etc/letsencrypt/live/threadwire.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threadwire.ai/privkey.pem;

    root /var/www/threadwire/dist;
    index index.html;

    # gzip the static bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> FastAPI (uvicorn on localhost:8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Long-cache hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
