<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockers</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="blockers.js"></script>
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <button onclick="navigateTo('blockers')">Blockers</button>
    <button onclick="navigateTo('salesorders')">Salesorders</button>
    <button onclick="navigateTo('dashboard')">Dashboard</button>
    <button onclick="navigateTo('parts')">Parts</button>
    <button onclick="navigateTo('workorders')">Workorders</button>
    <button onclick="navigateTo('graph'">Visualization</button>
    <button onclick="navigateTo('logout')">Logout</button>
  </nav>

  <!-- Page Content -->
  <div class="container">
    <!-- Left Pane: Blockers List -->
    <div class="left-pane">
      <h2>Blockers</h2>
      <table id="blockersTable">
  <thead>
    <tr>
      <th>Edit</th>
      <th>Title</th>
      <th>
        Status
        <input
          type="text"
          id="filterStatus"
          placeholder="Search Status"
          oninput="filterBlockers()"
        />
      </th>
      <th>Sales Order</th>
      <th>Line Number</th>
      <th>Part Number</th>
      <th>
        Category
        <input
          type="text"
          id="filterCategory"
          placeholder="Search Category"
          oninput="filterBlockers()"
        />
      </th>
      <th>
        Impact
        <input
          type="text"
          id="filterImpact"
          placeholder="Search Impact"
          oninput="filterBlockers()"
        />
      </th>
      <th>Owner</th>
      <th>Probability</th>
    </tr>
  </thead>
  <tbody>
    <!-- Blockers data will be dynamically added here -->
  </tbody>
</table>

    </div>

    <!-- Right Pane: Action Items List -->
    <div class="right-pane">
      <h2>Action Items</h2>
      <table id="actionsTable">
        <thead>
          <tr>
		  <th>Edit</th>
            <th>Action Item</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody>
          <!-- Action items data will be dynamically added here -->
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
