<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sales Orders</title><style>body{font-family:Arial,sans-serif;margin:0;padding:0;background-color:#f4f4f4}.header{text-align:center;padding:10px;background-color:#007acc;color:#fff;font-size:24px}.date-container{display:flex;justify-content:space-around;padding:10px;background-color:#fff;margin:10px auto;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,.1)}.card{border:1px solid #ddd;padding:10px;border-radius:5px;background-color:#ffffe0;margin:10px;box-shadow:0 2px 5px rgba(0,0,0,.1);text-align:center}.card h3{margin:0;font-size:18px;color:#007acc}.card p{margin:5px 0}</style><script defer="defer" src="/app/static/js/main.53e3d164.js"></script></head><body><div class="header">Sales Orders</div><div id="sales-orders"></div><script>async function fetchSalesOrders(){try{const e=await fetch("/api/salesorders"),t=(await e.json()).reduce(((e,t)=>(e[t.dueDate]||(e[t.dueDate]=[]),e[t.dueDate].push(t),e)),{}),n=document.getElementById("sales-orders");Object.keys(t).forEach((e=>{const a=document.createElement("div");a.className="date-container";const r=document.createElement("h2");r.textContent=new Date(e).toDateString(),a.appendChild(r),t[e].forEach((e=>{const t=document.createElement("div");t.className="card",t.innerHTML=`\n              <h3>${e.salesOrder}</h3>\n              <p>Program: ${e.program}</p>\n              <p>Qty: ${e.qty}</p>\n              <p>Location: ${e.location}</p>\n              <p>Status: ${e.status}</p>\n              <p>Customer: ${e.customer}</p>\n              <p>Line: ${e.line}</p>\n            `,a.appendChild(t)})),n.appendChild(a)}))}catch(e){console.error("Error fetching sales orders:",e)}}fetchSalesOrders()</script></body></html>
