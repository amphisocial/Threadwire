<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ThreadWire</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-blue-500 text-white py-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">ThreadWire</h1>
            <nav class="space-x-4">
                <a href="index.html" class="hover:underline">Home</a>
                <a href="register.html" class="hover:underline">Register</a>
                <a href="product.html" class="hover:underline">Products</a>
            </nav>
        </div>
    </header>
    <main class="container mx-auto py-10 max-w-lg">
        <h2 class="text-2xl font-bold text-center mb-6">Contact Us</h2>
        <form action="mailto:your-email@example.com" method="post" class="bg-white shadow p-6 rounded">
            <label for="name" class="block font-bold mb-2">Name</label>
            <input type="text" id="name" name="name" class="w-full mb-4 p-2 border border-gray-300 rounded" required>

            <label for="email" class="block font-bold mb-2">Email</label>
            <input type="email" id="email" name="email" class="w-full mb-4 p-2 border border-gray-300 rounded" required>

            <label for="message" class="block font-bold mb-2">Message</label>
            <textarea id="message" name="message" rows="5" class="w-full mb-6 p-2 border border-gray-300 rounded" required></textarea>

            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Send Message</button>
        </form>
    </main>
    <footer class="bg-gray-800 text-white py-4 text-center">
        <p>&copy; 2024 ThreadWire. All rights reserved.</p>
    </footer>
</body>
</html>
