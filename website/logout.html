
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Threadwire User Login</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('../img/IMG_6184.png') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            width: 380px;
            text-align: center;
        }

        .form-container h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
        }

        .form-container label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #555;
            text-align: left;
            font-size: 14px;
        }

        .form-container input,
        .form-container select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-container button {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 8px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .form-container button:hover {
            background-color: #0056b3;
        }

        .form-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: -5px;
        }

        .form-inline span {
            font-size: 12px;
            color: #555;
            margin-right: 10px;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
            width: 320px;
        }

        .popup h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .popup label {
            display: block;
            margin-top: 8px;
            font-weight: bold;
            color: #555;
        }

        .popup input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .popup button {
            width: 48%;
            margin-top: 10px;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .popup button:hover {
            background-color: #0056b3;
        }

        .popup button:last-child {
            background-color: #d9534f;
        }

        .popup button:last-child:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>
	<script>
    document.addEventListener('DOMContentLoaded', () => {
        sessionStorage.removeItem('userId'); // Clear the user session
        window.location.href = 'newuser.html'; // Redirect to the login page
    });
</script>

</body>
</html>
